name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Notify deployment started
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}/admin/deploys" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"started\",\"repo\":\"${{ github.repository }}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\"}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Astro site
        run: bun run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/arielonoriaga-portfolio"
          strip_components: 1
          rm: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: ls -lh /var/www/arielonoriaga-portfolio/index.html && echo "Deployment verified"

      - name: Notify deployment result
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}/admin/deploys" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$([ \"$STATUS\" = 'success' ] && echo success || echo failed)\",\"repo\":\"${{ github.repository }}\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\"}"
