version: '3.9'

services:
  portfolio:
    image: arielonoriaga/portfolio:latest
    container_name: portfolio-arielonoriaga
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
